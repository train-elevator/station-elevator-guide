                    // 上記のいずれにもマッチしない場合、汎用的に「〜方面」を抽出
                    if (!directionInfo && fullLine.includes('方面')) {
                        // 括弧内の方面情報を抽出（例：「（新木場・海老名・大崎方面）」）
                        const directionMatch = fullLine.match(/（([^）]*方面[^）]*)）/);
                        if (directionMatch) {
                            directionInfo = directionMatch[1];
                        }
                    }
                    
                    // グリーン車路線かどうか判定
                    const greenCarLines = ['湘南新宿ライン', '東海道線', '横須賀線', '宇都宮線', '高崎線', '常磐線'];
                    const isGreenCarLine = greenCarLines.some(line => fullLine.includes(line));
                    
                    // キーを作成（方面+改札情報+編成情報+号車番号）
                    const key = `${directionInfo}-${exitInfo}-${opt.formationInfo || 'default'}-${opt.car}`;
                    
                    if (!uniqueEntries.has(key)) {
                        uniqueEntries.set(key, {
                            car: opt.car,
                            directionInfo: directionInfo,
                            exitInfo: exitInfo,
                            formationInfo: opt.formationInfo,
                            isGreenCarLine: isGreenCarLine
                        });
                    }
                });
                
                // 方面+改札情報ごとにグループ化（異なる編成の号車をまとめる）
                const displayGroups = new Map();
                uniqueEntries.forEach((entry, key) => {
                    const groupKey = `${entry.directionInfo}-${entry.exitInfo}`;
                    if (!displayGroups.has(groupKey)) {
                        displayGroups.set(groupKey, {
                            directionInfo: entry.directionInfo,
                            exitInfo: entry.exitInfo,
                            entries: []
                        });
                    }
                    displayGroups.get(groupKey).entries.push(entry);
                });
                
                // 方面によって号車が同じ場合は方面情報を削除してマージ
                const mergedGroups = new Map();
                displayGroups.forEach((group, key) => {
                    const { directionInfo, exitInfo, entries } = group;
                    
                    // 同じ改札で異なる方面のグループを探す
                    let shouldMerge = false;
                    const carNumbers = entries.map(e => e.car).sort().join('-');
                    
                    // 同じ改札情報を持つ他のグループをチェック
                    for (const [otherKey, otherGroup] of displayGroups.entries()) {
                        if (otherKey !== key && 
                            otherGroup.exitInfo === exitInfo && 
                            otherGroup.directionInfo !== directionInfo) {
                            const otherCarNumbers = otherGroup.entries.map(e => e.car).sort().join('-');
                            if (carNumbers === otherCarNumbers) {
                                shouldMerge = true;
                                break;
                            }
                        }
                    }
                    
                    // マージする場合は方面情報を削除
                    const mergeKey = shouldMerge ? exitInfo : `${directionInfo}-${exitInfo}`;
                    
                    if (!mergedGroups.has(mergeKey)) {
                        mergedGroups.set(mergeKey, {
                            directionInfo: shouldMerge ? '' : directionInfo,
                            exitInfo: exitInfo,
                            entries: entries
                        });
                    }
                });
                
                // mergedGroupsをdisplayGroupsに置き換え
                displayGroups.clear();
                mergedGroups.forEach((group, key) => {
                    displayGroups.set(key, group);
                });
                
                // 全編成種類を確認
                const allFormationsSet = [...new Set(carOptions.map(opt => opt.formationInfo).filter(f => f))];
                const hasMultipleFormations = allFormationsSet.length > 1;
                
                // 注釈文を生成
                let noteText = '';
                if (hasMultipleFormations && allFormationsSet.length === 2) {
                    allFormationsSet.sort((a, b) => {
                        const numA = parseInt(a.match(/\d+/)[0]);
                        const numB = parseInt(b.match(/\d+/)[0]);
                        return numB - numA;
                    });
                    const smallerFormation = allFormationsSet[1];
                    noteText = `※（ ）内は、${smallerFormation}時の号車です。`;
                }
                
                // HTML生成
                let html = '';
                
                // 注釈を最初に表示
                if (noteText) {
                    html += `<div class="formation-note" style="font-size: 14px; color: #666; margin-bottom: 20px; padding: 12px; background: #f8f9ff; border-radius: 8px;">${noteText}</div>`;
                }
                
                // 方面でグループをソート
                const sortedGroups = Array.from(displayGroups.values()).sort((a, b) => {
                    // 方面の順序を定義（番線を優先）
                    const directionOrder = [
                        '3番線・4番線',
                        '6番線',
                        '7番線',
                        '11番線（大宮方面）',
                        '横浜方面',
                        '大宮方面',
                        '新宿方面',
                        '逗子方面',
                        '東京方面',
                        '高尾方面'
                    ];
                    const indexA = directionOrder.indexOf(a.directionInfo);
                    const indexB = directionOrder.indexOf(b.directionInfo);
                    
                    // 同じ方面の場合は、改札情報でソート
                    if (a.directionInfo === b.directionInfo) {
                        return a.exitInfo.localeCompare(b.exitInfo, 'ja');
                    }
                    
                    if (indexA !== -1 && indexB !== -1) return indexA - indexB;
                    if (indexA !== -1) return -1;
                    if (indexB !== -1) return 1;
                    return 0;
                });
                
                let currentDirection = '';
                
                // 各グループを表示
                sortedGroups.forEach(group => {
                    const { directionInfo, exitInfo, entries } = group;
                    
                    // 方面が変わったら見出しと区切り線を表示
                    if (directionInfo && directionInfo !== currentDirection) {
                        if (currentDirection) {
                            html += '<div class="group-divider" style="height: 3px; background: #667eea; margin: 25px 0; border-radius: 2px;"></div>';
                        }
                        
                        // 番線と方面を改行して表示
                        let displayDirection = directionInfo;
                        // 「3・4番ホーム（宇都宮方面からの上野・新宿方面）」のようなパターンを検出
                        const platformDirectionMatch = directionInfo.match(/^(.+番(?:ホーム|線))（(.+)）$/);
                        if (platformDirectionMatch) {
                            // 番線と方面を2行に分ける
                            displayDirection = `${platformDirectionMatch[1]}<br><span style="font-size: 16px;">(${platformDirectionMatch[2]})</span>`;
                        }
                        
                        html += `<div class="direction-header" style="font-size: 18px; font-weight: 600; color: #667eea; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #667eea; text-align: center;">${displayDirection}</div>`;
                        currentDirection = directionInfo;
                    }
                    
                    // 編成でソート（大きい順）
                    entries.sort((a, b) => {
                        if (!a.formationInfo && !b.formationInfo) return 0;
                        if (!a.formationInfo) return 1;
                        if (!b.formationInfo) return -1;
                        const numA = parseInt(a.formationInfo.match(/\d+/)[0]);
                        const numB = parseInt(b.formationInfo.match(/\d+/)[0]);
                        return numB - numA;
                    });
                    
                    // 基準号車（最初の項目、通常は15両編成）
                    const mainCar = entries[0].car;
                    const isGreenCarLine = entries[0].isGreenCarLine;
                    const isMainGreenCar = (mainCar === 4 || mainCar === 5) && isGreenCarLine;
                    
                    let carDisplay = `${mainCar}号車`;
                    if (isMainGreenCar) {
                        carDisplay += ` <span style="font-size: 14px; color: #9ACD32;">※グリーン車</span>`;
                    }
                    
                    // 括弧内の号車（2番目以降の項目、通常は10両編成）
                    if (entries.length > 1 && hasMultipleFormations) {
                        const alternateCars = entries.slice(1).map(item => {
                            const altCar = item.car;
                            const isAltGreenCar = (altCar === 4 || altCar === 5) && isGreenCarLine;
                            return isAltGreenCar ? `${altCar}号車 <span style="font-size: 14px; color: #9ACD32;">※グリーン車</span>` : `${altCar}号車`;
                        }).join('、');
                        carDisplay += `<br><span style="font-size: 24px; color: #999;">(${alternateCars})</span>`;
                    }
                    
                    html += `
                        <div class="car-option">
                            <div class="car-number" style="font-size: 36px; font-weight: 700;">${carDisplay}</div>
                            ${exitInfo ? `<div class="car-label" style="font-size: 15px;">${exitInfo}</div>` : ''}
                        </div>
                    `;
                });
                
                resultCar.innerHTML = html;
                resultNote.textContent = '目的の改札・方面に応じて選んでください';
            }
            
            result.classList.add('show');
            errorMessage.classList.remove('show');
        });

        // Enterキーで検索
        destinationInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchButton.click();
            }
        });
    </script>
</body>
</html>
