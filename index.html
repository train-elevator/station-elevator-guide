            border: 2px solid #e0e0e0;

            z-index: 1000;
            display: none;
            margin-top: -10px;

        .dropdown.show {
            display: block;
        }

        .dropdown-item {
            padding: 15px;

        .dropdown-item:last-child {

                line: 'JR京葉線（8両編成）',
                note: 'エレベーター付近'
            },
            '市川塩浜-keiyo-10': {
                car: 6,
                line: 'JR京葉線（10両編成）',
                note: 'エレベーター付近'
            },
            '市川塩浜-keiyo-8': {
                car: 4,
                line: 'JR京葉線（8両編成）',
                note: 'エレベーター付近'
            },
            '二俣新町-keiyo': {
                car: 8,
                line: 'JR京葉線',
                note: 'エレベーター付近'
            },
            '南船橋-keiyo-10': {
                car: 3,
                line: 'JR京葉線（10両編成）',
                note: 'エレベーター付近'
            },
            '南船橋-keiyo-8': {
                car: 6,
                line: 'JR京葉線（8両編成）',
                note: 'エレベーター付近'
            },
            '新習志野-keiyo': {
                car: 5,
                line: 'JR京葉線',
                note: 'エレベーター付近'
            },
            '海浜幕張-keiyo-10': {
                car: 4,
                line: 'JR京葉線（10両編成）',
                note: 'エレベーター付近'
            },
            '海浜幕張-keiyo-8': {
                car: 7,
                line: 'JR京葉線（8両編成）',
                note: 'エレベーター付近'
            },
            '検見川浜-keiyo': {
                car: 7,
                line: 'JR京葉線',
                note: 'エレベーター付近'
            },
            '稲毛海岸-keiyo': {
                car: 5,
                line: 'JR京葉線',
                note: 'エレベーター付近'
            },
            '千葉みなと-keiyo': {
                car: 4,
                line: 'JR京葉線',
                note: 'エレベーター付近'
            },
            '蘇我-keiyo': {
                car: 10,
                line: 'JR京葉線',
                note: 'エレベーター付近'
            }
        };

        // 駅リストを生成（検索用）
        const stationList = [];
        const stationLineMap = {}; // 駅ごとの路線をグループ化
        
        Object.keys(stationData).forEach(key => {
            const data = stationData[key];
            const stationName = key.split('-')[0];
            const lineType = key.split('-')[1]; // yamanote, saikyo, etc.
            
            // 基本路線名を抽出（改札・方面情報を除去）
            let baseLine = data.line.split('（')[0]; // 「JR埼京線（新南改札方面）」→「JR埼京線」
            
            if (!stationLineMap[stationName]) {
                stationLineMap[stationName] = {};
            }
            
            if (!stationLineMap[stationName][baseLine]) {
                stationLineMap[stationName][baseLine] = [];
            }
            
            stationLineMap[stationName][baseLine].push(key);
        });
        
        // 駅と路線の組み合わせリストを作成
        Object.keys(stationLineMap).forEach(stationName => {
            Object.keys(stationLineMap[stationName]).forEach(lineName => {
                stationList.push({
                    station: stationName,
                    line: lineName,
                    keys: stationLineMap[stationName][lineName]
                });
            });
        });

        // DOM要素
        const destinationInput = document.getElementById('destination-input');
        const destinationDropdown = document.getElementById('destination-dropdown');
        const clearButton = document.getElementById('clear-button');
        const searchButton = document.getElementById('search-button');
        const errorMessage = document.getElementById('error-message');
        const result = document.getElementById('result');
        const resultCar = document.getElementById('result-car');
        const resultNote = document.getElementById('result-note');

        let selectedStation = null;

        // クリアボタンの表示/非表示
        function updateClearButton() {
            if (destinationInput.value.trim().length > 0) {
                clearButton.classList.add('show');
            } else {
                clearButton.classList.remove('show');
            }
        }

        // クリアボタンのクリックイベント
        clearButton.addEventListener('click', function(e) {
            e.preventDefault();
            destinationInput.value = '';
            selectedStation = null;
            destinationDropdown.classList.remove('show');
            errorMessage.classList.remove('show');
            result.classList.remove('show');
            clearButton.classList.remove('show');
            destinationInput.focus();
        });

        // 検索フィルタリング（駅名完全一致のみ）
        function filterStations(query) {
            if (!query) return [];
            
            return stationList.filter(item => 
                item.station === query || item.station.includes(query)
            );
        }

        // ドロップダウン表示
        function showDropdown(stations) {
            if (stations.length === 0) {
                destinationDropdown.classList.remove('show');
                return;
            }

            destinationDropdown.innerHTML = stations.map((item, index) => `
                <div class="dropdown-item" data-index="${index}">
                    <div class="station-name">${item.station}</div>
                    <div class="line-name">${item.line}</div>
                </div>
            `).join('');

            destinationDropdown.classList.add('show');

            // クリックイベント
            document.querySelectorAll('.dropdown-item').forEach(item => {
                item.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    const station = stations[index];
                    selectStation(station);
                });
            });
        }

        // 駅選択
        function selectStation(station) {
            selectedStation = station;
            destinationInput.value = `${station.station}（${station.line}）`;
            destinationDropdown.classList.remove('show');
            errorMessage.classList.remove('show');
        }

        // 入力イベント
        destinationInput.addEventListener('input', function() {
            const query = this.value.trim();
            selectedStation = null;
            updateClearButton();
            
            if (query.length === 0) {
                destinationDropdown.classList.remove('show');
                return;
            }

            const filtered = filterStations(query);
            showDropdown(filtered);
        });

        // フォーカスアウト時にドロップダウンを閉じる
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.input-wrapper')) {
                destinationDropdown.classList.remove('show');
            }
        });

        // 検索ボタン
        searchButton.addEventListener('click', function() {
            if (!selectedStation) {
                errorMessage.textContent = '降りる駅を選択してください';
                errorMessage.classList.add('show');
                result.classList.remove('show');
                return;
            }

            // 複数の号車データを取得
            const carOptions = selectedStation.keys.map(key => {
                const data = stationData[key];
                const fullLine = data.line; // line全体を取得
                
                // labelを正しく抽出
                let label = '';
                
                // JR埼京線（新木場・海老名・大崎方面）東南改札・南改札方面
                // から（）を除いた部分を取得
                if (fullLine.includes('（')) {
                    // 最初の（以降の部分
                    const afterParen = fullLine.substring(fullLine.indexOf('（') + 1);
                    // 路線名部分を除去
                    label = afterParen;
                } else {
                    label = '';
                }
                
                // 方面グループを判定（fullLineから判定）
                let directionGroup = '';
                
                // 山手線：内回り・外回り
                if (fullLine.includes('内回り')) {
                    directionGroup = '内回り';
                } else if (fullLine.includes('外回り')) {
                    directionGroup = '外回り';
                }
                // 中央線：東京方面・高尾方面
                else if (fullLine.includes('東京方面')) {
                    directionGroup = '東京方面';
                } else if (fullLine.includes('高尾方面')) {
                    directionGroup = '高尾方面';
                }
                // 京浜東北線：大船方面・大宮方面
                else if (fullLine.includes('大船方面')) {
                    directionGroup = '大船方面';
                } else if (fullLine.includes('大宮方面') && !fullLine.includes('から')) {
                    directionGroup = '大宮方面';
                }
                // 埼京線：武蔵浦和・大宮方面 vs 新木場・海老名・大崎方面
                else if (fullLine.includes('新木場・海老名・大崎方面') || fullLine.includes('新木場方面')) {
                    directionGroup = '新木場・海老名・大崎方面';
                } else if (fullLine.includes('武蔵浦和・大宮方面')) {
                    directionGroup = '武蔵浦和・大宮方面';
                }
                // 湘南新宿ライン
                else if (fullLine.includes('大宮方面から')) {
                    directionGroup = '大宮方面から';
                } else if (fullLine.includes('横浜方面から')) {
                    directionGroup = '横浜方面から';
                }
                // 編成別
                else if (fullLine.includes('10両編成')) {
                    directionGroup = '10両編成';
                } else if (fullLine.includes('12両編成')) {
                    directionGroup = '12両編成';
                } else if (fullLine.includes('8両編成')) {
                    directionGroup = '8両編成';
                }
                // その他
                else {
                    directionGroup = 'その他';
                }
                
                return {
                    car: data.car,
                    label: label,
                    note: data.note,
                    directionGroup: directionGroup,
                    rawKey: key
                };
            });
            
            // 結果表示
            if (carOptions.length === 1) {
                // 1つの場合はシンプル表示
                resultCar.innerHTML = `<div class="car-number">${carOptions[0].car}号車</div>`;
                resultNote.textContent = carOptions[0].note;
            } else {
                // グループごとに分類
                const groups = {};
                carOptions.forEach(opt => {
                    const group = opt.directionGroup;
                    if (!groups[group]) {
                        groups[group] = [];
                    }
                    groups[group].push(opt);
                });

                // グループ表示の順序を決定
                const groupOrder = [
                    '新木場・海老名・大崎方面',
                    '武蔵浦和・大宮方面',
                    '内回り',
                    '外回り',
                    '東京方面',
                    '高尾方面',
                    '大船方面',
                    '大宮方面',
                    '大宮方面から',
                    '横浜方面から',
                    '8両編成',
                    '10両編成',
                    '12両編成'
                ];

                // グループごとに表示
                let html = '';
                let groupCount = 0;
                
                // 最初に総グループ数を記録（deleteの影響を受けないように）
                const totalGroups = Object.keys(groups).length;
                
                // 定義された順序でグループを表示
                groupOrder.forEach(groupKey => {
                    if (groups[groupKey]) {
                        if (groupCount > 0) {
                            html += '<div class="group-divider"></div>';
                        }
                        
                        // グループヘッダーを表示（グループが2つ以上ある場合のみ）
                        if (totalGroups > 1 && groupKey !== 'その他') {
                            // 最初のカードのlabelから「〜方面」部分を抽出
                            const firstLabel = groups[groupKey][0].label;
                            let headerText = '';
                            
                            // 「方面」の位置を見つける
                            const houmenIdx = firstLabel.indexOf('方面');
                            if (houmenIdx !== -1) {
                                // 「方面」を含む部分まで抽出（括弧は既に除去済み）
                                headerText = firstLabel.substring(0, houmenIdx + 2);
                            } else {
                                headerText = groupKey;
                            }
                            
                            html += `<div class="direction-header">${headerText}</div>`;
                        }
                        
                        groups[groupKey].forEach(opt => {
                            // labelから括弧を除去して、方面と改札を分割
                            let parts = opt.label.replace(/[（）]/g, '').split(/(?<=方面)/);
                            // let line1 = parts[0] || opt.label; // 方面部分（削除）
                            let line2 = parts[1] ? parts[1].trim() : ''; // 改札部分のみ表示
                            
                            html += `
                                <div class="car-option">
                                    <div class="car-number">${opt.car}号車</div>
                                    ${line2 ? `<div class="car-label">${line2}</div>` : ''}
                                </div>
                            `;
                        });
                        
                        groupCount++;
                        delete groups[groupKey]; // 処理済みを削除
                    }
                });
                
                // 残りのグループ（その他）を表示
                if (groups['その他']) {
                    // その他が1つだけの場合は区切り線なし
                    if (groupCount > 0 && groups['その他'].length > 1) {
                        html += '<div class="group-divider"></div>';
                    }
                    
                    groups['その他'].forEach(opt => {
                        // labelから括弧を除去して、方面と改札を分割
                        let parts = opt.label.replace(/[（）]/g, '').split(/(?<=方面)/);
                        let line2 = parts[1] ? parts[1].trim() : ''; // 改札部分のみ表示
                        
                        html += `
                            <div class="car-option">
                                <div class="car-number">${opt.car}号車</div>
                                ${line2 ? `<div class="car-label">${line2}</div>` : ''}
                            </div>
                        `;
                    });
                }
                
                resultCar.innerHTML = html;
                resultNote.textContent = '目的の改札・方面に応じて選んでください';
            }
            
            result.classList.add('show');
            errorMessage.classList.remove('show');
        });

        // Enterキーで検索
        destinationInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchButton.click();
            }
        });
    </script>
